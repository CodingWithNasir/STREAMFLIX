<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Forgot Password')}"></head>
<body class="page">
<nav th:replace="~{fragments/layout :: nav}"></nav>
<main class="auth-page">
    <div class="auth-card">
        <p class="eyebrow">Account Recovery</p>
        <h1 class="headline-md">Reset your password</h1>
        <p class="body-sm">Enter your email and we'll generate a reset token.</p>
        <form id="forgotForm" style="margin-top:2rem">
            <div class="form-group">
                <label class="form-label" for="email">Email</label>
                <input class="form-input" type="email" id="email" required>
            </div>
            <div class="form-error hidden" id="forgotError"></div>
            <div class="form-success hidden" id="forgotSuccess"></div>
            <button type="submit" class="btn btn-primary" style="width:100%">Send Reset Link</button>
        </form>
        <div class="form-footer"><a href="/login">Back to sign in</a></div>
    </div>
</main>
<script th:src="@{/js/main.js}"></script>
<script>
document.addEventListener('DOMContentLoaded', () => {
    document.getElementById('forgotForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const err = document.getElementById('forgotError');
        const ok = document.getElementById('forgotSuccess');
        err.classList.add('hidden'); ok.classList.add('hidden');
        try {
            await StreamFlix.auth.forgotPassword(document.getElementById('email').value);
            ok.textContent = 'Check your email for reset instructions. Use the token on the reset page.';
            ok.classList.remove('hidden');
        } catch (ex) {
            StreamFlix.showError(err, ex.message);
        }
    });
});
</script>
</body>
</html>
