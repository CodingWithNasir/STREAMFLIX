<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Reset Password')}"></head>
<body class="page">
<nav th:replace="~{fragments/layout :: nav}"></nav>
<main class="auth-page">
    <div class="auth-card">
        <p class="eyebrow">Account Recovery</p>
        <h1 class="headline-md">Set new password</h1>
        <form id="resetForm" style="margin-top:2rem">
            <div class="form-group">
                <label class="form-label" for="token">Reset Token</label>
                <input class="form-input" type="text" id="token" required>
            </div>
            <div class="form-group">
                <label class="form-label" for="password">New Password</label>
                <input class="form-input" type="password" id="password" required minlength="6">
            </div>
            <div class="form-error hidden" id="resetError"></div>
            <div class="form-success hidden" id="resetSuccess"></div>
            <button type="submit" class="btn btn-primary" style="width:100%">Update Password</button>
        </form>
        <div class="form-footer"><a href="/login">Back to sign in</a></div>
    </div>
</main>
<script th:src="@{/js/main.js}"></script>
<script>
document.addEventListener('DOMContentLoaded', () => {
    const params = new URLSearchParams(window.location.search);
    if (params.get('token')) document.getElementById('token').value = params.get('token');
    document.getElementById('resetForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const err = document.getElementById('resetError');
        const ok = document.getElementById('resetSuccess');
        err.classList.add('hidden'); ok.classList.add('hidden');
        try {
            await StreamFlix.auth.resetPassword(
                document.getElementById('token').value,
                document.getElementById('password').value
            );
            ok.textContent = 'Password updated. You can now sign in.';
            ok.classList.remove('hidden');
        } catch (ex) {
            StreamFlix.showError(err, ex.message);
        }
    });
});
</script>
</body>
</html>
