<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:fragment="head(title)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title} + ' — STREAMFLIX'">STREAMFLIX</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:ital,wght@0,400;0,600;1,400;1,600&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<nav th:fragment="nav" class="site-nav">
    <div class="container">
        <a href="/" class="site-logo">StreamFlix</a>
        <button class="nav-toggle" id="navToggle" aria-label="Menu">☰</button>
        <div class="nav-links">
            <a href="/">Catalog</a>
            <a href="/watchlist">Watchlist</a>
            <a href="/subscription">Plans</a>
            <a href="/profile">Profile</a>
            <a href="/admin" id="navAdmin" class="hidden">Admin</a>
        </div>
        <div class="nav-actions">
            <a href="/login" id="navLogin" class="btn btn-sm btn-ghost">Sign In</a>
            <a href="#" id="navLogout" class="btn btn-sm btn-ghost hidden">Sign Out</a>
        </div>
    </div>
</nav>
<footer th:fragment="footer" class="site-footer">
    <div class="container footer-inner">
        <span>© 2026 StreamFlix. Media infrastructure platform.</span>
        <div class="footer-links">
            <a href="/subscription">Pricing</a>
            <a href="/login">Sign In</a>
        </div>
    </div>
</footer>
</body>
</html>
