spring.application.name=streamflix

# H2 in-memory (switch to MySQL for production)
spring.datasource.url=jdbc:h2:mem:streamflix;DB_CLOSE_DELAY=-1;MODE=MySQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop
spring.sql.init.mode=never
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.h2.console.enabled=false

# JWT
jwt.secret=streamflix-jwt-secret-key-change-in-production-32chars
jwt.expiration-ms=86400000

# Thymeleaf
spring.thymeleaf.cache=false
